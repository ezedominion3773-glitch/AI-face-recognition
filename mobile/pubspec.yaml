name: face_access
description: AI-Powered Face Recognition & Access Control
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.14.0
  image_picker: ^1.1.2
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.3
  provider: ^6.1.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  animated_text_kit: ^4.2.2
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
